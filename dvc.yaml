stages:
  ingest:
    cmd: python src/data/ingestion.py
    deps:
      - src/data/ingestion.py
      - data/external/train.csv
    outs:
      - data/raw/:
          persist: true

  preprocess:
    cmd: python src/data/preprocess.py
    deps:
      - src/data/preprocess.py
      - data/raw/
      - data/external/store.csv
    outs:
      - data/processed/processed_sales.csv
  
  train:
    cmd: python src/models/train.py
    deps:
      - src/models/train.py
      - data/processed/processed_sales.csv
    outs:
      - models/xgboost_sales_model.json