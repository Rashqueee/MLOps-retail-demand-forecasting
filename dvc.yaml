stages:
  ingest:
    cmd: python src/data/ingestion.py
    deps:
      - src/data/ingestion.py
    outs:
      - data/raw.csv:
          persist: true

  preprocess:
    cmd: python src/data/preprocess.py
    deps:
      - src/data/preprocess.py
      - data/raw.csv
    outs:
      - data/processed.csv
  
  train:
    cmd: python src/models/train.py
    deps:
      - src/models/train.py
      - data/processed.csv
    outs:
      - models/xgboost_model.json