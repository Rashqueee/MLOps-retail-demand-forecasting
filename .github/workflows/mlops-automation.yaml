name: MLOps End-to-End Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v3

      - name: 2. Set up Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: 4. Stage 1 - Automated Unit Testing
        run: |
          pytest tests/

      - name: 5. Generate Mock Data untuk CI/CD
        run: |
          mkdir -p data
          cat <<EOF > data/processed.csv
          Year,Month,Day,Hour,DayOfWeek,product_id,product_name,price,stock,rating,daily_demand
          2026,6,9,10,1,1820799809,EKONOMI P0WER LIQUID JRUK NIPIS POUCH 760 ML - SABUN CUCI PIRING,9100,269,4.9,0
          2026,6,9,11,1,1820799809,EKONOMI P0WER LIQUID JRUK NIPIS POUCH 760 ML - SABUN CUCI PIRING,9100,269,4.9,0
          2026,6,9,12,1,1820799809,EKONOMI P0WER LIQUID JRUK NIPIS POUCH 760 ML - SABUN CUCI PIRING,9100,268,4.9,1
          2026,6,9,10,1,1820783878,Ultra UHT Cho 1000 Ml,21070,10,5.0,0
          2026,6,9,11,1,1820783878,Ultra UHT Cho 1000 Ml,21070,9,5.0,1
          2026,6,9,12,1,1820783878,Ultra UHT Cho 1000 Ml,21070,9,5.0,0
          2026,6,9,10,1,1820749559,Bogasari Terigu Segitiga Biru 1 Kg,13260,56,5.0,1
          2026,6,9,11,1,1820749559,Bogasari Terigu Segitiga Biru 1 Kg,13260,56,5.0,0
          2026,6,9,12,1,1820749559,Bogasari Terigu Segitiga Biru 1 Kg,13260,54,5.0,2
          2026,6,9,10,1,1820784664,VP Facial Tissue Kiloan 715 S,33400,153,5.0,0
          2026,6,9,11,1,1820784664,VP Facial Tissue Kiloan 715 S,33400,153,5.0,0
          2026,6,9,12,1,1820784664,VP Facial Tissue Kiloan 715 S,33400,153,5.0,0          
          EOF
          echo "--- VERIFIKASI FILE TERBUAT ---"
          ls -la data/

      - name: 6. Stage 2 - Automated Training (train.py)
        env:
          MLFLOW_TRACKING_URI: file:./mlruns 
          MLFLOW_ALLOW_FILE_STORE: "true"
        run: |
          python src/train.py --run_name "Automated_CT_Run"

      - name: 7. Stage 3 & 4 - Model Evaluation & Auto-Registry
        run: |
          python src/evaluate_model.py